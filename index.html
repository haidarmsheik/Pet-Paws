<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to your Pet & Paws account to browse and shop premium pet products.">
    <title>Sign In | Pet & Paws</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <style>
        :root {
            --pet-coral: #ff7f50;
            --pet-coral-dark: #f0663b;
            --pet-ink: #1d1d1d;
        }

        body {
            min-height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-image: linear-gradient(rgba(29, 29, 29, 0.42), rgba(29, 29, 29, 0.5)), url('image/backgr3.jpeg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        .form-container {
            background-color: rgba(255, 255, 255, 0.94);
            padding: 34px;
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.75);
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(10px);
        }

        .auth-logo {
            width: 96px;
            height: 88px;
            object-fit: contain;
            display: block;
            margin: 0 auto 10px;
        }

        .auth-eyebrow {
            color: var(--pet-coral);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 8px;
        }

        .form-container h2 {
            color: var(--pet-ink);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            color: #666;
            font-size: 0.95rem;
            text-align: center;
            margin-bottom: 26px;
        }

        .form-label {
            color: var(--pet-ink);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 14px;
            border: 1px solid #dedede;
            padding: 13px 15px;
        }

        .form-control:focus {
            border-color: var(--pet-coral);
            box-shadow: 0 0 0 0.22rem rgba(255, 127, 80, 0.2);
        }

        .btn-coral {
            background: linear-gradient(135deg, var(--pet-coral), #ff956d);
            border: 0;
            color: #fff;
            border-radius: 999px;
            font-weight: 700;
            padding: 13px 20px;
            box-shadow: 0 12px 26px rgba(255, 127, 80, 0.35);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-coral:hover,
        .btn-coral:focus {
            background: linear-gradient(135deg, var(--pet-coral-dark), var(--pet-coral));
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 16px 34px rgba(255, 127, 80, 0.42);
        }

        #message {
            min-height: 22px;
            color: #dc3545;
            font-size: 0.92rem;
            margin: 14px 0 0;
            text-align: center;
        }

        .auth-link {
            color: var(--pet-coral);
            font-weight: 700;
            text-decoration: none;
        }

        .auth-link:hover {
            color: var(--pet-coral-dark);
        }

        @media (max-width: 576px) {
            .form-container {
                padding: 26px 20px;
                border-radius: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-sm-10 col-md-7 col-lg-5 col-xl-4">
                <div class="form-container">
                    <img src="image/logo.png" alt="Pet & Paws Logo" class="auth-logo">
                    <p class="auth-eyebrow">Pet & Paws</p>
                    <h2 class="text-center">Sign In</h2>
                    <p class="auth-subtitle">Welcome back. Sign in to continue shopping for your pet essentials.</p>
                    <!-- Sign-in form -->
                    <form id="form-me">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control form-control-lg" id="email" placeholder="Enter email">
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control form-control-lg" id="password" placeholder="Password">
                        </div>
                        <button id="login-btn" type="submit" class="btn btn-coral w-100">Sign In</button>
                        <p id="message"> </p>
                    </form>
                    <!-- Link to signup.html -->
                    <p class="text-center mt-3 mb-0">Don't have an account? <a href="signup.html" class="auth-link">Sign up</a></p>
                </div>
            </div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.2/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="index.js"></script>
</body>
</html>
